name: Extension CI

on:
  push:
    paths:
      - "editors/code/**"
      - ".github/workflows/extension-ci.yml"
  pull_request:
    paths:
      - "editors/code/**"
      - ".github/workflows/extension-ci.yml"

jobs:
  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/code
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: editors/code/pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Verify pinned pnpm version
        run: test "$(pnpm --version)" = "10.32.1"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build LSP test binary
        working-directory: ${{ github.workspace }}
        run: cargo build -p vhs-analyzer-lsp --locked

      - name: Test
        env:
          VHS_ANALYZER_LSP_BINARY: ${{ github.workspace }}/target/debug/vhs-analyzer
        run: pnpm run test

      - name: Build
        run: pnpm run build
